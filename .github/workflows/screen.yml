name: Stock Screener

on:
  schedule:
    - cron: "*/30 13-21 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: alert_state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - name: Run screener
        env:
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: "465"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          STRICT_BLUE_ABOVE: "false"
          DAILY_LOOKBACK_BARS: "3"
          H4_LOOKBACK_BARS: "2"
          MAX_WORKERS: "8"
        run: python main.py --once

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: alert_state.json
          key: alert-state-${{ github.run_id }}
